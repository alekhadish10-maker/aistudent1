<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Student</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:radial-gradient(circle at top,#0d1b2a,#000814);color:white;display:flex;}
.sidebar{width:80px;height:100vh;background:#0a0f1f;padding-top:20px;display:flex;flex-direction:column;align-items:center;gap:30px;border-right:1px solid rgba(255,255,255,0.1);}
.sidebar div{color:#7dafff;cursor:pointer;font-size:14px;text-align:center;}
.main{flex:1;padding:30px;}
.logo-box{background:linear-gradient(135deg,#1e90ff,#00c6ff);padding:12px 18px;border-radius:12px;font-weight:700;font-size:20px;}
.header{display:flex;align-items:center;gap:15px;}
.title{font-size:28px;font-weight:600;}
.subtitle{color:#7dafff;}
.search-container{text-align:center;margin-top:50px;}
.search-container h2{font-size:36px;margin-bottom:25px;}
.search-bar{display:flex;justify-content:center;gap:10px;}
.search-bar input{width:500px;padding:15px 20px;border-radius:40px;border:none;outline:none;background:#111c2d;color:white;font-size:16px;box-shadow:0 0 15px rgba(0,191,255,0.5);}
.search-bar button{padding:15px 25px;border-radius:40px;border:none;background:linear-gradient(135deg,#1e90ff,#00c6ff);color:white;cursor:pointer;font-size:16px;}
.tabs-section{margin-top:50px;}
.tabs-header{display:flex;justify-content:space-between;margin-bottom:20px;}
.tabs{display:flex;flex-direction:column;gap:15px;}
.tab{background:#111c2d;padding:15px;border-radius:12px;position:relative;}
.tab button{position:absolute;top:10px;right:10px;background:red;border:none;color:white;border-radius:6px;cursor:pointer;padding:4px 8px;}
.sources{margin-top:10px;font-size:14px;color:#7dafff;}
.sources a{color:#00c6ff;text-decoration:none;}
</style>
</head>
<body>
<div class="sidebar">
<div>🏠<br>Hem</div>
<div onclick="loadHistory()">🕘<br>Historik</div>
<div>⭐<br>Favoriter</div>
<div>🛠<br>Verktyg</div>
<div>👤<br>Profil</div>
</div>
<div class="main">
<div class="header">
<div class="logo-box">AS</div>
<div>
<div class="title">AI Student</div>
<div class="subtitle">Din smarta hjälp med läxor & fakta</div>
</div>
</div>
<div class="search-container">
<h2>Vad har du för fråga?</h2>
<div class="search-bar">
<input type="text" id="questionInput" placeholder="Skriv din fråga här...">
<button onclick="askAI()">Sök</button>
</div>
</div>
<div class="tabs-section">
<div class="tabs-header">
<h3>Dina flikar</h3>
<button onclick="clearTabs()" style="background:red;color:white;border:none;padding:8px 15px;border-radius:8px;">Ta bort alla</button>
</div>
<div class="tabs" id="tabsContainer"></div>
</div>
</div>
<script>
async function askAI() {
   const input = document.getElementById("questionInput");
   const question = input.value.trim();
   if (!question) return;
   const container = document.getElementById("tabsContainer");
   const tab = document.createElement("div");
   tab.className = "tab";
   tab.innerHTML = `<strong>${question}</strong><br><br>Hämtar svar...
<button onclick="this.parentElement.remove()">✕</button>`;
   container.prepend(tab);
   input.value = "";
   try {
       const response = await fetch("https://api.openai.com/v1/chat/completions", {
           method: "POST",
           headers: {
               "Content-Type": "application/json",
               "Authorization": "Bearer DIN_API_NYCKEL_HÄR"
           },
           body: JSON.stringify({
               model: "gpt-4o-mini",
               messages: [
                   { role: "system", content: "Du är AI Student. Förklara enkelt och ge fakta. Lägg även till 2 trovärdiga källor med länkar." },
                   { role: "user", content: question }
               ]
           })
       });
       const data = await response.json();
       const answer = data.choices[0].message.content;
       tab.innerHTML = `
<strong>${question}</strong><br><br>
           ${answer}
<button onclick="this.parentElement.remove()">✕</button>
       `;
       saveToHistory(question, answer);
   } catch (error) {
       tab.innerHTML = `<strong>${question}</strong><br><br>Fel vid hämtning av svar.
<button onclick="this.parentElement.remove()">✕</button>`;
   }
}
function saveToHistory(question, answer) {
   const history = JSON.parse(localStorage.getItem("aiHistory")) || [];
   history.push({question, answer});
   localStorage.setItem("aiHistory", JSON.stringify(history));
}
function loadHistory() {
   const history = JSON.parse(localStorage.getItem("aiHistory")) || [];
   const container = document.getElementById("tabsContainer");
   container.innerHTML = "";
   history.reverse().forEach(item => {
       const tab = document.createElement("div");
       tab.className = "tab";
       tab.innerHTML = `
<strong>${item.question}</strong><br><br>
           ${item.answer}
<button onclick="this.parentElement.remove()">✕</button>
       `;
       container.appendChild(tab);
   });
}
function clearTabs() {
   document.getElementById("tabsContainer").innerHTML = "";
   localStorage.removeItem("aiHistory");
}
</script>
</body>
</html>
